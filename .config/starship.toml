add_newline = true

[character]
success_symbol = "[❯](purple)"
error_symbol = "[❯](red)"
vimcmd_symbol = "[❮](green)"

[os]
disabled = false
style = "bg:red fg:crust"

[os.symbols]
Arch = "  󰣇 "

[directory.substitutions]
"Documentos" = "󰈙 "
"Descargas" = " "
"Música" = "󰝚 "
"Imágenes" = " "
"Developer" = "󰲋 "
"Desktop" = "󰋜 "

[git_branch]
symbol = "󰘬 "

[username]
format = '󰋜[ $user]($style)'
show_always = true

[directory]
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"
