## AUTOSTART ##
exec-once = gammastep -O 4000 -g 0.75:0.765:0.848 -m wayland
#exec-once = /usr/lib/xdg-desktop-portal -r 
#exec-once = /home/aaron/.config/conky/start.sh
#exec-once = /home/aaron/.config/mango/autostart.sh
exec-once = awww-daemon &
exec-once = waybar &  
## MONITOR ##
monitorrule = name:DP-4,x: 0,y:0, width:3440,height:1440,refresh:100
monitorrule = name:DP-3, x: 960,y:1440, width:1920, height:1080, refresh:100, scale: 1.25

## RULES ##
env = XDG_CURRENT_DESKTOP,wlroots
env = MOZ_ENABLE_WAYLAND, 1
env = XDG_SESSION_TYPE,wayland
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = WLR_DRM_NO_ATOMIC,1
env = nvidia_drm.modeset,1
env = MOZ_ENABLE_WAYLAND=1,zen-browser

xkb_rules_layout= us

## LOOK ##
border_radius = 5
borderpx= 0
#focuscolor= #e3e3e3
new_is_master=1
default_mfact=0.55
default_nmaster=1
smartgaps=0 
gappih= 5
gappiv= 5
gappoh= 5
gappov= 5

blur= 1
blur_layer=1
blur_optimized=1
blur_params_radius = 12
blur_params_num_passes = 2
no_radius_when_single = 1

animations=1
layer_animations=1

animation_type_open = slide
animation_type_close= slide

layer_animation_type_open= fade
layer_animation_type_close= fade

animation_duration_open = 320
animation_duration_close = 320
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1

#animation_curve_open = 0.86, 0, 0.07, 1
	animation_curve_open = 0.46,1.0,0.29,1
#animation_curve_tag = 0.86, 0, 0.07, 1
animation_curve_tag=0.46,1.0,0.29,1
#animation_curve_close = 0.86, 0, 0.07, 1
	animation_curve_close = 0.46,1.0,0.29,1
#animation_curve_opafadein=0.46,1.0,0.29,0.99
	animation_curve_opafadein= 0.46,1.0,0.29,1
#animation_curve_opafadeout=0.5,0.5,0.5,0.5
	animation_curve_opafadeout= 0.46,1.0,0.29,1

dwindle_split_ratio = 0.70

shadows = 0
layer_shadows=0

tagrule=id:1,layout_name:dwindle
tagrule=id:2,layout_name:dwindle
tagrule=id:3,layout_name:dwindle
tagrule=id:4,layout_name:dwindle
tagrule=id:5,layout_name:dwindle

## BINDS ##

## LAUNCH APPS & SERVICES ##
bind = SUPER, Return, spawn, kitty
bind = ALT, D, spawn, rofi -show drun 
bind = ALT, W, spawn, zen-browser
bind = ALT, F, spawn, thunar
#bind = ALT, S, spawn, waypaper
bind = Alt, N, spawn, /home/aaron/.config/rofi/modules/rofi-bluetooth
bind = Alt, P, spawn, rofi -show power-menu -modi power-menu:/home/aaron/.config/rofi/modules/rofi-power-menu -theme /home/aaron/.config/rofi/modules/power.rasi
bind = ALT, S, spawn, /home/aaron/.config/rofi/modules/wallpaper.sh
bind = CTRL + ALT, L, spawn, swaylock --screenshots --clock --indicator --indicator-idle-visible --effect-blur 7x5
#bind = ALT, N, spawn, /home/aaron/.config/rofi/modules/wall.sh

## FORMAT ##
bind = SUPER, Z, killclient
bind = CTRL + ALT, R, reload_config
bind = none , XF86AudioRaiseVolume,spawn ,pactl set-sink-volume @DEFAULT_SINK@ +5% 
bind = none , XF86AudioLowerVolume, spawn, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = none , XF86AudioMute, spawn, pactl set-sink-mute @DEFAULT_SINK@ toggle
#bind = SUPER,V, moveresize,curmove
bind = SUPER, X, togglefloating

## CHANGE TAGS ## 
bind = SUPER,1,view,1
bind = SUPER,2,view,2
bind = SUPER,3,view,3
bind = SUPER,4,view,4
bind = SUPER,5,view,5

## CHANGE WINDOW TAGS ##
bind=SUPER+SHIFT,1,tag,1
bind=SUPER+SHIFT,2,tag,2
bind=SUPER+SHIFT,3,tag,3
bind=SUPER+SHIFT,4,tag,4
bind=SUPER+SHIFT,5,tag,5

## FOCUS ##
bind = SUPER, left, focusdir, left
bind = SUPER, right, focusdir, right
bind = SUPER, up, focusdir, up
bind = SUPER, down, focusdir, down
bind = ALT,C ,spawn ,pkill -SIGUSR1 waybar

mousebind = SUPER, code:273,moveresize, curresize
mousebind = SUPER,btn_left,moveresize, curmove

## WINDOW RULES ##
windowrule = noblur:1,appid: .*
windowrule = noblur:0, appid: Alacritty
windowrule = noblur:0, appid: kitty
windowrule = noblur:0, appid: foot
windowrule = noblur:0, appid: waybar
windowrule = isfloating:1, width:900, height:350, appid:pavucontrol
windowrule = isfloating:1, width:650, height:450, appid:nwg-look
windowrule = isfloating:1, width:400, height:550, appid:localsend
layerrule = noanim:1, layer_name: waybar
